<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOX HUB - Inscription</title>
    <link rel="icon" type="image/png" href="https://files.catbox.moe/sfpupx.png">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #141414;
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #141414 100%);
        }
        .auth-container {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 40px;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.9);
            border: 1px solid #333;
        }
        .auth-logo { text-align: center; margin-bottom: 15px; }
        .auth-logo img { height: 60px; width: auto; border-radius: 10px; }
        .auth-title {
            text-align: center;
            font-size: 28px;
            font-weight: 900;
            color: #e50914;
            margin-bottom: 5px;
        }
        .auth-title span { color: #fff; font-weight: 300; }
        .auth-subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            color: #ccc;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 5px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #2a2a2a;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }
        .form-group input:focus {
            border-color: #e50914;
            box-shadow: 0 0 0 2px rgba(229,9,20,0.3);
        }
        .form-group input::placeholder { color: #666; }
        .auth-submit {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: none;
            background: #e50914;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .auth-submit:hover { background: #f40612; transform: scale(1.02); }
        .auth-divider {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 20px 0;
            color: #666;
            font-size: 13px;
        }
        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #333;
        }
        .google-btn {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #2a2a2a;
            color: #fff;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        .google-btn:hover { background: #333; border-color: #555; }
        .google-btn svg { width: 20px; height: 20px; }
        .auth-error { color: #e50914; font-size: 13px; text-align: center; margin-top: 10px; min-height: 20px; }
        .auth-success { color: #4CAF50; font-size: 13px; text-align: center; margin-top: 10px; min-height: 20px; }
        .auth-switch {
            text-align: center;
            margin-top: 18px;
            color: #888;
            font-size: 14px;
        }
        .auth-switch a {
            color: #e50914;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }
        .auth-switch a:hover { text-decoration: underline; }
        .back-home {
            text-align: center;
            margin-top: 15px;
        }
        .back-home a {
            color: #666;
            font-size: 13px;
            text-decoration: none;
        }
        .back-home a:hover { color: #e50914; }

        @media (max-width: 480px) {
            .auth-container { padding: 25px 20px; }
            .auth-title { font-size: 22px; }
            .auth-logo img { height: 45px; }
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-logo">
            <img src="https://files.catbox.moe/sfpupx.png" alt="NOX HUB">
        </div>
        <div class="auth-title">NOX <span>HUB</span></div>
        <div class="auth-subtitle">Créez votre compte gratuitement</div>

        <button class="google-btn" onclick="loginWithGoogle()">
            <svg viewBox="0 0 48 48">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>
            Continuer avec Google
        </button>

        <div class="auth-divider">ou</div>

        <form id="registerForm" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label for="name">Nom d'utilisateur</label>
                <input type="text" id="name" placeholder="Votre nom" required>
            </div>
            <div class="form-group">
                <label for="email">Adresse email</label>
                <input type="email" id="email" placeholder="exemple@email.com" required>
            </div>
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" placeholder="Min. 6 caractères" required minlength="6">
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirmer le mot de passe</label>
                <input type="password" id="confirmPassword" placeholder="Confirmer" required minlength="6">
            </div>
            <button type="submit" class="auth-submit" id="registerBtn">S'inscrire</button>
            <div id="errorMessage" class="auth-error"></div>
            <div id="successMessage" class="auth-success"></div>
        </form>

        <div class="auth-switch">
            Déjà un compte ? <a href="login.html">Se connecter</a>
        </div>
        <div class="back-home">
            <a href="index.html">← Retour à l'accueil</a>
        </div>
    </div>

    <script>
        const GOOGLE_CLIENT_ID = '530968593138-gobv77c9dropth023eao4atleki7mrbv.apps.googleusercontent.com';

        function initGoogleOneTap() {
            if (typeof google !== 'undefined' && google.accounts) {
                try {
                    google.accounts.id.initialize({
                        client_id: GOOGLE_CLIENT_ID,
                        callback: handleGoogleCredential,
                        auto_select: false,
                        cancel_on_tap_outside: true,
                        context: 'signup'
                    });
                    google.accounts.id.prompt();
                } catch (e) { console.log('Erreur Google:', e); }
            }
        }

        function handleGoogleCredential(response) {
            try {
                const payload = parseJwt(response.credential);
                const user = {
                    email: payload.email,
                    name: payload.name || payload.given_name || payload.email.split('@')[0],
                    avatar: payload.picture || null,
                    googleId: payload.sub
                };

                const users = JSON.parse(localStorage.getItem('noxhub_users') || '[]');
                if (!users.some(u => u.email === user.email)) {
                    users.push({
                        email: user.email,
                        password: 'google_oauth_' + Date.now(),
                        name: user.name,
                        avatar: user.avatar,
                        googleId: user.googleId
                    });
                    localStorage.setItem('noxhub_users', JSON.stringify(users));
                }

                localStorage.setItem('noxhub_user', JSON.stringify(user));
                window.location.href = 'dashboard.html';
            } catch (error) {
                console.error('Erreur Google:', error);
                document.getElementById('errorMessage').textContent = 'Erreur de connexion Google';
            }
        }

        function parseJwt(token) {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            return JSON.parse(atob(base64));
        }

        function loginWithGoogle() {
            if (typeof google !== 'undefined' && google.accounts) {
                try { google.accounts.id.prompt(); } catch (e) {
                    document.getElementById('errorMessage').textContent = 'Erreur de connexion Google';
                }
            } else {
                document.getElementById('errorMessage').textContent = 'Chargement de Google...';
                const script = document.createElement('script');
                script.src = 'https://accounts.google.com/gsi/client';
                script.onload = () => setTimeout(initGoogleOneTap, 500);
                document.head.appendChild(script);
            }
        }

        function handleRegister(event) {
            event.preventDefault();
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const errorEl = document.getElementById('errorMessage');
            const successEl = document.getElementById('successMessage');
            const btn = document.getElementById('registerBtn');

            errorEl.textContent = '';
            successEl.textContent = '';

            if (password !== confirm) {
                errorEl.textContent = 'Les mots de passe ne correspondent pas.';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Chargement...';

            setTimeout(() => {
                const users = JSON.parse(localStorage.getItem('noxhub_users') || '[]');
                if (users.some(u => u.email === email)) {
                    errorEl.textContent = 'Cet email est déjà utilisé.';
                    btn.disabled = false;
                    btn.textContent = 'S\'inscrire';
                    return;
                }

                users.push({ email, password, name, avatar: null });
                localStorage.setItem('noxhub_users', JSON.stringify(users));

                const userData = { email, name, avatar: null };
                localStorage.setItem('noxhub_user', JSON.stringify(userData));

                successEl.textContent = 'Compte créé avec succès !';
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 500);
            }, 800);
        }

        document.addEventListener('DOMContentLoaded', function() {
            if (localStorage.getItem('noxhub_user')) {
                window.location.href = 'dashboard.html';
                return;
            }

            setTimeout(() => {
                if (typeof google !== 'undefined') {
                    initGoogleOneTap();
                } else {
                    const script = document.createElement('script');
                    script.src = 'https://accounts.google.com/gsi/client';
                    script.onload = () => setTimeout(initGoogleOneTap, 500);
                    document.head.appendChild(script);
                }
            }, 1000);
        });
    </script>

</body>
</html>
