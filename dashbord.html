<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOX HUB DASHBORD</title>
    <link rel="icon" type="image/png" href="https://files.catbox.moe/sfpupx.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #141414;
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #141414; }
        ::-webkit-scrollbar-thumb { background: #e50914; border-radius: 4px; }

        .navbar {
            background: rgba(20,20,20,0.98);
            padding: 12px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 15px rgba(0,0,0,0.8);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .logo img { height: 40px; width: auto; border-radius: 8px; }
        .logo-text {
            font-size: 28px;
            font-weight: 900;
            color: #e50914;
            letter-spacing: 2px;
        }
        .logo-text span { color: #fff; font-weight: 300; }
        .nav-links {
            display: flex;
            align-items: center;
            gap: 25px;
        }
        .nav-links a {
            color: #b3b3b3;
            font-size: 14px;
            transition: 0.3s;
            cursor: pointer;
            position: relative;
            font-weight: 500;
            text-decoration: none;
        }
        .nav-links a:hover { color: #fff; }
        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: #e50914;
            transition: width 0.3s;
        }
        .nav-links a:hover::after,
        .nav-links a.active::after { width: 100%; }
        .nav-links a.active { color: #fff; }
        .nav-links .user-info {
            color: #fff;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-links .user-info .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #e50914;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            overflow: hidden;
        }
        .nav-links .user-info .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .nav-links .user-info .logout-btn {
            color: #888;
            cursor: pointer;
            font-size: 12px;
            transition: 0.3s;
        }
        .nav-links .user-info .logout-btn:hover { color: #e50914; }

        .main-content {
            padding-top: 80px;
            padding: 100px 60px 40px;
            min-height: 100vh;
        }
        .page-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .page-subtitle {
            color: #888;
            font-size: 16px;
            margin-bottom: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #333;
        }
        .stat-card .stat-number {
            font-size: 36px;
            font-weight: 900;
            color: #e50914;
        }
        .stat-card .stat-label {
            color: #888;
            font-size: 14px;
            margin-top: 5px;
        }

        .section-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }
        .movie-card {
            background: #1a1a1a;
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            position: relative;
        }
        .movie-card:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            z-index: 10;
        }
        .movie-card img {
            width: 100%;
            height: 280px;
            object-fit: cover;
        }
        .movie-card .info { padding: 12px; }
        .movie-card .info h3 {
            font-size: 15px;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 600;
        }
        .movie-card .info .meta {
            font-size: 13px;
            color: #aaa;
            display: flex;
            justify-content: space-between;
        }
        .movie-card .info .meta .year { color: #888; }
        .movie-card .rating-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            color: #f5c518;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 600;
        }
        .movie-card .badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #e50914;
            color: #fff;
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 15px;
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            color: #888;
            padding: 60px 20px;
        }
        .empty-state .icon { font-size: 48px; margin-bottom: 15px; }
        .empty-state h3 { color: #fff; margin-bottom: 10px; }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #2a2a2a;
            color: #fff;
            padding: 15px 25px;
            border-radius: 10px;
            z-index: 999;
            transform: translateY(100px);
            opacity: 0;
            transition: 0.4s;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            font-size: 14px;
            max-width: 350px;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { border-left: 4px solid #4CAF50; }
        .toast.error { border-left: 4px solid #e50914; }
        .toast.info { border-left: 4px solid #2196F3; }

        @media (max-width: 768px) {
            .main-content { padding: 80px 20px 30px; }
            .movie-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
            .navbar { padding: 10px 20px; }
            .logo img { height: 30px; }
            .logo-text { font-size: 20px; }
            .nav-links { gap: 10px; }
            .nav-links a { font-size: 11px; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 480px) {
            .logo-text { font-size: 16px; }
            .logo img { height: 25px; }
            .nav-links a { font-size: 9px; }
            .page-title { font-size: 24px; }
        }
    </style>
</head>
<body>

    <!-- ===== TOAST ===== -->
    <div class="toast" id="toast"></div>

    <!-- ===== NAVBAR ===== -->
    <nav class="navbar">
        <div class="logo" onclick="window.location.href='index.html'">
            <img src="https://files.catbox.moe/sfpupx.png" alt="NOX HUB">
            <span class="logo-text">NOX <span>HUB</span></span>
        </div>
        <div class="nav-links">
            <a href="index.html">Accueil</a>
            <a class="active" href="dashboard.html">Tableau de bord</a>
            <a href="profile.html">Profil</a>
            <a href="support.html">Support</a>
            <span class="user-info" id="userInfo">
                <span class="avatar" id="userAvatar">U</span>
                <span id="userName">Utilisateur</span>
                <span class="logout-btn" onclick="logout()">✕</span>
            </span>
        </div>
    </nav>

    <!-- ===== MAIN ===== -->
    <div class="main-content">
        <h1 class="page-title" id="welcomeTitle">👋 Bonjour, Utilisateur</h1>
        <p class="page-subtitle">Découvrez vos films et séries recommandés</p>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="movieCount">0</div>
                <div class="stat-label">Films disponibles</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="listCount">0</div>
                <div class="stat-label">Dans ma liste</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="historyCount">0</div>
                <div class="stat-label">Regardés récemment</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="ratingCount">0</div>
                <div class="stat-label">Films notés</div>
            </div>
        </div>

        <h2 class="section-title">▸ Recommandations pour vous</h2>
        <div class="movie-grid" id="recommendGrid"></div>

        <h2 class="section-title" style="margin-top:40px;">▸ Ma liste</h2>
        <div class="movie-grid" id="myListGrid"></div>
    </div>

    <script>
        const API_KEY = 'Godszeal';
        const BASE_URL = 'https://gzmovieboxapi.septorch.tech/api';
        const HOT_API = `${BASE_URL}/hot-movies-series`;

        let currentUser = JSON.parse(localStorage.getItem('noxhub_user') || 'null');
        let myList = JSON.parse(localStorage.getItem('noxhub_mylist') || '[]');
        let history = JSON.parse(localStorage.getItem('noxhub_history') || '[]');
        let userRatings = JSON.parse(localStorage.getItem('noxhub_ratings') || '{}');
        let allItems = [];

        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type}`;
            toast.classList.add('show');
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => toast.classList.remove('show'), 3500);
        }

        function logout() {
            localStorage.removeItem('noxhub_user');
            window.location.href = 'login.html';
        }

        function updateUserUI() {
            if (currentUser) {
                document.getElementById('welcomeTitle').textContent = `👋 Bonjour, ${currentUser.name}`;
                const avatar = document.getElementById('userAvatar');
                if (currentUser.avatar) {
                    avatar.innerHTML = `<img src="${currentUser.avatar}" alt="${currentUser.name}">`;
                } else {
                    avatar.textContent = currentUser.name.charAt(0).toUpperCase();
                }
                document.getElementById('userName').textContent = currentUser.name;
            } else {
                window.location.href = 'login.html';
            }
        }

        function updateStats() {
            document.getElementById('movieCount').textContent = allItems.length || '0';
            document.getElementById('listCount').textContent = myList.length || '0';
            document.getElementById('historyCount').textContent = history.length || '0';
            document.getElementById('ratingCount').textContent = Object.keys(userRatings).length || '0';
        }

        function displayMovies(items, containerId) {
            const grid = document.getElementById(containerId);
            if (!items || items.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column:1/-1;">
                        <div class="icon">🎬</div>
                        <h3>Aucun contenu</h3>
                        <p>Explorez notre catalogue pour découvrir des films et séries.</p>
                    </div>
                `;
                return;
            }

            let html = '';
            items.slice(0, 8).forEach(item => {
                const title = item.title || 'Titre inconnu';
                const coverUrl = item.cover?.url || '';
                const year = item.releaseDate ? item.releaseDate.substring(0, 4) : 'N/A';
                const rating = item.imdbRatingValue || '?';
                const id = item.subjectId || item.id;
                const isInList = myList.some(mid => mid === id);

                html += `
                    <div class="movie-card" onclick="window.location.href='dashboard.html?id=${id}'">
                        ${isInList ? '<div class="badge">★ Dans ma liste</div>' : ''}
                        <div class="rating-badge">★ ${rating}</div>
                        <img src="${coverUrl}" alt="${title}" loading="lazy" onerror="this.src='https://via.placeholder.com/200x280/333/666?text=No+Image'">
                        <div class="info">
                            <h3>${title}</h3>
                            <div class="meta">
                                <span class="year">${year}</span>
                            </div>
                        </div>
                    </div>
                `;
            });

            grid.innerHTML = html;
        }

        async function loadContent() {
            try {
                const response = await fetch(`${HOT_API}?apikey=${API_KEY}`);
                const data = await response.json();

                if (data.status === 'success') {
                    const movies = data.data?.movie || [];
                    const series = data.data?.tv || [];
                    allItems = [...movies, ...series];
                    displayMovies(allItems, 'recommendGrid');

                    // Ma liste
                    const myListItems = allItems.filter(item => {
                        const id = item.subjectId || item.id;
                        return myList.includes(id);
                    });
                    displayMovies(myListItems, 'myListGrid');

                    updateStats();
                }
            } catch (error) {
                console.error('Erreur:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            if (!currentUser) {
                window.location.href = 'login.html';
                return;
            }
            updateUserUI();
            loadContent();
        });
    </script>

</body>
</html>
